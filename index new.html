<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>預告星球 — 最新電影預告片</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --card: #1e1e1e;
    --accent: #e50914;
    --gold: #f5c518;
    --text: #f5f5f1;
    --muted: #aaa;
    --border: #2a2a2a;
    --nav-h: 64px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NAVBAR ── */
  .navbar {
    position: fixed; top:0; left:0; right:0; z-index:200;
    height: var(--nav-h);
    padding: 0 5vw;
    display: flex; align-items: center; justify-content: space-between; gap:16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.92) 0%, transparent 100%);
    transition: background 0.4s;
  }
  .navbar.scrolled { background: rgba(15,15,15,0.98); backdrop-filter: blur(8px); }
  .nav-logo { font-size: clamp(22px,3vw,30px); font-weight:900; color:var(--accent); letter-spacing:-1px; cursor:pointer; flex-shrink:0; }
  .nav-links { display:flex; gap:20px; }
  .nav-link { font-size:13px; color:rgba(255,255,255,0.7); cursor:pointer; border:none; background:none; font-family:'Noto Sans TC',sans-serif; transition:color 0.2s; padding:4px 0; white-space:nowrap; }
  .nav-link:hover, .nav-link.active { color:#fff; }
  .nav-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .nav-right input {
    background: rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.25);
    color:#fff; padding:7px 14px; font-family:'Noto Sans TC',sans-serif;
    font-size:13px; outline:none; width:clamp(120px,14vw,200px); border-radius:20px;
    transition: all 0.2s;
  }
  .nav-right input:focus { border-color:#fff; background:rgba(0,0,0,0.8); }
  .nav-right input::placeholder { color:rgba(255,255,255,0.35); }
  .nav-right button { background:var(--accent); border:none; color:#fff; padding:7px 16px; font-size:12px; font-weight:700; cursor:pointer; font-family:'Noto Sans TC',sans-serif; border-radius:20px; transition:background 0.2s; white-space:nowrap; }
  .nav-right button:hover { background:#c40812; }
  .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:4px; background:none; border:none; flex-shrink:0; }
  .hamburger span { display:block; width:24px; height:2px; background:#fff; border-radius:2px; transition:all 0.3s; }
  .hamburger.open span:nth-child(1) { transform:rotate(45deg) translate(5px,5px); }
  .hamburger.open span:nth-child(2) { opacity:0; }
  .hamburger.open span:nth-child(3) { transform:rotate(-45deg) translate(5px,-5px); }

  /* ── MOBILE MENU ── */
  .mobile-menu {
    display:none; position:fixed; top:var(--nav-h); left:0; right:0;
    background:rgba(15,15,15,0.98); backdrop-filter:blur(8px);
    z-index:199; padding:16px 5vw 20px; flex-direction:column; gap:2px;
    border-bottom:1px solid var(--border);
  }
  .mobile-menu.open { display:flex; }
  .mobile-menu-link { background:none; border:none; color:rgba(255,255,255,0.8); font-family:'Noto Sans TC',sans-serif; font-size:15px; padding:13px 8px; text-align:left; cursor:pointer; border-bottom:1px solid var(--border); transition:color 0.2s; }
  .mobile-menu-link:hover { color:#fff; }
  .mobile-search { display:flex; gap:8px; margin-top:14px; }
  .mobile-search input { flex:1; background:rgba(255,255,255,0.08); border:1px solid var(--border); color:#fff; padding:10px 14px; font-family:'Noto Sans TC',sans-serif; font-size:14px; outline:none; border-radius:4px; }
  .mobile-search input::placeholder { color:var(--muted); }
  .mobile-search button { background:var(--accent); border:none; color:#fff; padding:10px 18px; font-family:'Noto Sans TC',sans-serif; font-weight:700; font-size:13px; cursor:pointer; border-radius:4px; }

  /* ── HERO ── */
  .hero {
    position:relative; width:100%;
    height: 100svh; min-height:520px; max-height:920px;
    overflow:hidden; background:#000;
  }
  .hero-bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity 1.2s ease; }
  .hero-bg.loaded { opacity:0.5; }
  .hero-gradient {
    position:absolute; inset:0;
    background:
      linear-gradient(to right, rgba(15,15,15,0.97) 0%, rgba(15,15,15,0.55) 55%, rgba(15,15,15,0.05) 100%),
      linear-gradient(to top, rgba(15,15,15,1) 0%, rgba(15,15,15,0.0) 50%);
  }
  .hero-content {
    position:absolute;
    bottom: clamp(100px,16vh,200px);
    left: 5vw;
    max-width: min(580px, 88vw);
    animation: heroIn 0.9s ease both;
  }
  @keyframes heroIn { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }

  .hero-genre-tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
  .hero-genre-tag { background:rgba(255,255,255,0.12); color:rgba(255,255,255,0.8); font-size:10px; padding:3px 10px; border-radius:12px; font-weight:500; letter-spacing:0.5px; }

  .hero-title { font-size:clamp(26px,5.5vw,62px); font-weight:900; line-height:1.05; margin-bottom:12px; text-shadow:0 2px 16px rgba(0,0,0,0.7); letter-spacing:-1px; }

  .hero-rating {
    display:flex; align-items:center; gap:12px;
    margin-bottom:14px; flex-wrap:wrap;
  }
  .hero-imdb { display:flex; align-items:center; gap:6px; background:var(--gold); color:#000; padding:3px 10px; border-radius:4px; font-size:12px; font-weight:900; font-family:'Space Mono',monospace; }
  .hero-year { font-size:13px; color:rgba(255,255,255,0.6); font-weight:300; }
  .hero-runtime { font-size:13px; color:rgba(255,255,255,0.6); font-weight:300; }

  .hero-desc { font-size:clamp(12px,1.5vw,15px); line-height:1.75; color:rgba(255,255,255,0.75); margin-bottom:28px; font-weight:300; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }

  .hero-buttons { display:flex; gap:12px; flex-wrap:wrap; }
  .hero-btn-play {
    display:inline-flex; align-items:center; gap:10px;
    background:#fff; color:#000; border:none;
    padding:clamp(11px,1.6vh,15px) clamp(20px,3vw,32px);
    font-size:clamp(13px,1.6vw,17px); font-weight:700; cursor:pointer;
    font-family:'Noto Sans TC',sans-serif; transition:all 0.2s; border-radius:6px;
  }
  .hero-btn-play:hover { background:rgba(255,255,255,0.82); transform:scale(1.04); }
  .hero-btn-play::before { content:'▶'; font-size:13px; }
  .hero-btn-info {
    display:inline-flex; align-items:center; gap:10px;
    background:rgba(109,109,110,0.65); color:#fff; border:none;
    padding:clamp(11px,1.6vh,15px) clamp(20px,3vw,32px);
    font-size:clamp(13px,1.6vw,17px); font-weight:700; cursor:pointer;
    font-family:'Noto Sans TC',sans-serif; transition:all 0.2s; border-radius:6px;
  }
  .hero-btn-info:hover { background:rgba(109,109,110,0.45); transform:scale(1.04); }
  .hero-btn-info::before { content:'ℹ'; }

  .hero-indicators { position:absolute; bottom:clamp(50px,9vh,90px); right:5vw; display:flex; gap:6px; }
  .hero-dot { width:14px; height:3px; background:rgba(255,255,255,0.3); cursor:pointer; border:none; transition:all 0.3s; border-radius:2px; }
  .hero-dot.active { background:#fff; width:24px; }

  .hero-poster {
    position:absolute; right:6vw; bottom:clamp(80px,14vh,160px);
    width:clamp(100px,12vw,160px);
    border-radius:8px; overflow:hidden;
    box-shadow:0 16px 48px rgba(0,0,0,0.8);
    border:2px solid rgba(255,255,255,0.1);
    opacity:0; transition:opacity 0.8s ease;
  }
  .hero-poster.loaded { opacity:1; }
  .hero-poster img { width:100%; display:block; }

  .hero-loading { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Space Mono',monospace; font-size:13px; color:var(--muted); letter-spacing:3px; }

  /* ── AD TOP ── */
  .ad-top { background:var(--surface); text-align:center; padding:10px; font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:2px; border-bottom:1px solid var(--border); }
  .ad-top span { border:1px dashed var(--border); padding:4px 16px; display:inline-block; }

  /* ── CATEGORY BAR ── */
  .category-bar {
    background:var(--bg); padding:14px 5vw;
    display:flex; gap:8px; overflow-x:auto; flex-wrap:nowrap;
    border-bottom:1px solid var(--border);
    position:sticky; top:var(--nav-h); z-index:50;
    scrollbar-width:none;
  }
  .category-bar::-webkit-scrollbar { display:none; }
  .cat-btn { background:transparent; border:1px solid var(--border); color:var(--muted); padding:7px 16px; font-family:'Noto Sans TC',sans-serif; font-size:clamp(11px,1.3vw,13px); cursor:pointer; transition:all 0.2s; border-radius:20px; white-space:nowrap; flex-shrink:0; }
  .cat-btn:hover, .cat-btn.active { border-color:#fff; color:#fff; background:rgba(255,255,255,0.08); }

  /* ── CONTENT ── */
  .content-section { padding:clamp(24px,4vw,48px) 5vw; }
  .row-title { font-size:clamp(17px,2.2vw,22px); font-weight:700; margin-bottom:18px; display:flex; align-items:center; justify-content:space-between; }
  .row-title-sub { font-size:13px; color:#46d369; font-weight:400; cursor:pointer; }
  .row-title-sub:hover { color:#fff; }

  /* 海報格線 */
  .posters-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(clamp(120px,14vw,180px), 1fr));
    gap:clamp(8px,1.2vw,16px);
    margin-bottom:48px;
  }
  .poster-card {
    cursor:pointer; border-radius:8px; overflow:hidden;
    position:relative; background:var(--card);
    transition:transform 0.3s, box-shadow 0.3s;
    aspect-ratio: 2/3;
  }
  .poster-card:hover { transform:scale(1.06) translateY(-4px); box-shadow:0 16px 40px rgba(0,0,0,0.7); z-index:5; }
  .poster-card img { width:100%; height:100%; object-fit:cover; display:block; background:#222; transition:opacity 0.3s; }
  .poster-card .poster-overlay {
    position:absolute; inset:0;
    background:linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.0) 50%);
    opacity:0; transition:opacity 0.3s;
    display:flex; flex-direction:column; justify-content:flex-end; padding:12px;
  }
  .poster-card:hover .poster-overlay { opacity:1; }
  .poster-play { position:absolute; top:50%; left:50%; transform:translate(-50%,-60%); width:44px; height:44px; background:rgba(229,9,20,0.9); border-radius:50%; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.3s, transform 0.3s; }
  .poster-card:hover .poster-play { opacity:1; transform:translate(-50%,-50%); }
  .poster-play::after { content:''; border-left:15px solid #fff; border-top:9px solid transparent; border-bottom:9px solid transparent; margin-left:3px; }
  .poster-title { font-size:12px; font-weight:700; line-height:1.3; color:#fff; margin-bottom:3px; }
  .poster-rating { display:flex; align-items:center; gap:4px; font-size:10px; color:var(--gold); font-family:'Space Mono',monospace; }
  .poster-no-img { width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#1a1a2e,#16213e); font-size:11px; color:var(--muted); text-align:center; padding:12px; line-height:1.4; }

  /* 水平滾動（手機） */
  .posters-row { display:flex; gap:10px; overflow-x:auto; padding-bottom:8px; margin-bottom:40px; scrollbar-width:thin; scrollbar-color:#444 transparent; }
  .posters-row::-webkit-scrollbar { height:3px; }
  .posters-row::-webkit-scrollbar-thumb { background:#444; border-radius:2px; }
  .poster-card-h { flex-shrink:0; width:clamp(100px,28vw,140px); aspect-ratio:2/3; border-radius:8px; overflow:hidden; cursor:pointer; position:relative; background:var(--card); transition:transform 0.3s; }
  .poster-card-h:hover { transform:scale(1.06); }
  .poster-card-h img { width:100%; height:100%; object-fit:cover; display:block; background:#222; }
  .poster-card-h .poster-play { position:absolute; top:50%; left:50%; transform:translate(-50%,-60%); width:36px; height:36px; background:rgba(229,9,20,0.9); border-radius:50%; display:flex; align-items:center; justify-content:center; opacity:0; transition:all 0.3s; }
  .poster-card-h:hover .poster-play { opacity:1; transform:translate(-50%,-50%); }
  .poster-card-h .poster-play::after { content:''; border-left:12px solid #fff; border-top:7px solid transparent; border-bottom:7px solid transparent; margin-left:2px; }

  /* ── AD MID ── */
  .ad-mid { margin:0 5vw 40px; background:var(--surface); border:1px dashed var(--border); text-align:center; padding:clamp(20px,3vw,36px); font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:2px; border-radius:8px; }

  /* ── MODAL ── */
  .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.94); z-index:1000; align-items:center; justify-content:center; padding:16px; }
  .modal.open { display:flex; }
  .modal-inner { width:100%; max-width:min(920px,95vw); position:relative; }
  .modal-close { position:absolute; top:-44px; right:0; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#fff; padding:6px 16px; font-size:12px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; border-radius:4px; transition:background 0.2s; }
  .modal-close:hover { background:rgba(255,255,255,0.2); }
  .modal-video { width:100%; aspect-ratio:16/9; border:none; border-radius:8px; }
  .modal-info { margin-top:16px; display:flex; gap:16px; align-items:flex-start; }
  .modal-poster { width:70px; flex-shrink:0; border-radius:6px; overflow:hidden; }
  .modal-poster img { width:100%; display:block; }
  .modal-text .modal-title { font-size:clamp(16px,2.5vw,22px); font-weight:700; margin-bottom:6px; }
  .modal-text .modal-meta { font-size:12px; color:var(--muted); font-weight:300; line-height:1.6; }

  /* ── LOADING / ERROR ── */
  .loading { text-align:center; padding:80px; font-family:'Space Mono',monospace; color:var(--muted); letter-spacing:3px; font-size:12px; }
  .loading-dots::after { content:''; animation:dots 1.5s infinite; }
  @keyframes dots { 0%{content:''} 33%{content:'.'} 66%{content:'..'} 100%{content:'...'} }
  .error-msg { text-align:center; padding:40px; color:var(--accent); font-size:12px; font-family:'Space Mono',monospace; letter-spacing:2px; }

  /* ── FOOTER ── */
  footer { padding:clamp(24px,4vw,40px) 5vw; border-top:1px solid var(--border); font-size:12px; color:var(--muted); font-weight:300; display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:8px; }

  /* ── BREAKPOINTS ── */
  @media (max-width:900px) {
    .nav-links { display:none; }
    .nav-right { display:none; }
    .hamburger { display:flex; }
    .hero-poster { display:none; }
  }
  @media (max-width:600px) {
    :root { --nav-h:54px; }
    .hero { max-height:72svh; min-height:420px; }
    .hero-content { bottom:clamp(70px,12vh,110px); }
    .hero-desc { display:none; }
    .hero-btn-info { display:none; }
    .hero-indicators { bottom:24px; }
    footer { flex-direction:column; text-align:center; }
  }
  @media (max-width:380px) {
    .hero-title { font-size:22px; }
    .hero-btn-play { font-size:13px; padding:10px 18px; }
  }
  @media (min-width:1400px) {
    .navbar, .category-bar, .content-section, .ad-mid, footer { padding-left:80px; padding-right:80px; }
    .hero-content { left:80px; }
    .hero-poster { right:80px; }
    .hero-indicators { right:80px; }
  }
</style>
</head>

    <button class="modal-close" onclick="closeVideoModal()">✕ 關閉</button>
    <iframe class="modal-video" id="modalIframe" allowfullscreen allow="autoplay"></iframe>
    <div class="modal-info">
      <div class="modal-poster"><img id="modalPoster" src="" alt="" style="display:none"></div>
      <div class="modal-text">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-meta" id="modalMeta"></div>
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<footer>
  <div>© 2025 預告星球 · 所有預告片版權歸原電影公司所有</div>
  <div>Powered by YouTube Data API &amp; OMDb API</div>
</footer>

<script>
const YT_KEY   = 'AIzaSyDzTEh4VKdi5Ov152yUrwEiOVdAV_18tCs';
const OMDB_KEY = '862136e4';

let allVideos=[], omdbCache={}, heroIndex=0, heroTimer=null, menuOpen=false;

// Navbar scroll
window.addEventListener('scroll',()=>{
  document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>60);
});

// Hamburger
function toggleMenu(){
  menuOpen=!menuOpen;
  document.getElementById('hamburger').classList.toggle('open',menuOpen);
  document.getElementById('mobileMenu').classList.toggle('open',menuOpen);
}
document.addEventListener('click',e=>{
  if(menuOpen&&!e.target.closest('#mobileMenu')&&!e.target.closest('#hamburger')){
    menuOpen=false;
    document.getElementById('hamburger').classList.remove('open');
    document.getElementById('mobileMenu').classList.remove('open');
  }
});

function formatDate(s){ const d=new Date(s); return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`; }
function truncate(s,n){ return s&&s.length>n?s.slice(0,n)+'…':(s||''); }
function esc(s){ return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

// 從 YouTube 標題萃取電影名稱
function extractMovieTitle(ytTitle){
  let t = ytTitle
    .replace(/\|[^|]*$/,'')
    .replace(/[-–][^-–]*trailer[^-–]*/i,'')
    .replace(/official.*trailer.*/i,'')
    .replace(/\(.*?\)/g,'')
    .replace(/【.*?】/g,'')
    .replace(/［.*?］/g,'')
    .replace(/trailer/gi,'')
    .replace(/teaser/gi,'')
    .replace(/預告片?/g,'')
    .replace(/官方/g,'')
    .replace(/正式/g,'')
    .replace(/\s+/g,' ')
    .trim();
  return t || ytTitle.split(/[-|]/)[0].trim();
}

// OMDb 取得電影資料
async function fetchOMDb(title){
  if(!title) return null;
  if(omdbCache[title]) return omdbCache[title];
  try{
    const r=await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(title)}&apikey=${OMDB_KEY}`);
    const d=await r.json();
    if(d.Response==='True'){
      omdbCache[title]=d;
      return d;
    }
  }catch(e){}
  return null;
}

// Modal
function openVideo(videoId,title,date,posterUrl){
  document.getElementById('modalIframe').src=`https://www.youtube.com/embed/${videoId}?autoplay=1`;
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalMeta').textContent=`發布日期：${formatDate(date)}`;
  if(posterUrl&&posterUrl!=='N/A'){
    const mp=document.getElementById('modalPoster');
    document.getElementById('modalPoster').style.display='block';
    document.getElementById('modalPoster').querySelector ? null : null;
    const img=document.getElementById('modalPoster').tagName==='IMG'
      ? document.getElementById('modalPoster')
      : document.getElementById('modalPoster').querySelector('img');
    // use correct element
    document.getElementById('modalPoster').outerHTML;
  }
  document.getElementById('videoModal').classList.add('open');
  document.body.style.overflow='hidden';
}

function openVideoFull(videoId,title,date,posterUrl){
  document.getElementById('modalIframe').src=`https://www.youtube.com/embed/${videoId}?autoplay=1`;
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalMeta').textContent=`發布日期：${formatDate(date)}`;
  const mp=document.getElementById('modalPoster');
  if(posterUrl&&posterUrl!=='N/A'){
    mp.style.display='block';
    mp.src=posterUrl;
  } else { mp.style.display='none'; }
  document.getElementById('videoModal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeVideoModal(){
  document.getElementById('videoModal').classList.remove('open');
  document.getElementById('modalIframe').src='';
  document.body.style.overflow='';
}
function closeModal(e){ if(e.target===document.getElementById('videoModal')) closeVideoModal(); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeVideoModal(); });

// Hero
function buildHero(videos){
  const hv=videos.slice(0,6);
  document.getElementById('heroLoading').style.display='none';
  document.getElementById('heroIndicators').innerHTML=hv.map((_,i)=>
    `<button class="hero-dot ${i===0?'active':''}" onclick="setHero(${i})"></button>`
  ).join('');
  setHeroVideo(0,hv);
  if(heroTimer) clearInterval(heroTimer);
  heroTimer=setInterval(()=>{ heroIndex=(heroIndex+1)%hv.length; setHeroVideo(heroIndex,hv); },8000);
}

async function setHeroVideo(i,videos){
  const v=(videos||allVideos.slice(0,6))[i]; if(!v) return;
  heroIndex=i;
  const thumb=v.snippet.thumbnails.maxres?.url||v.snippet.thumbnails.high?.url||v.snippet.thumbnails.medium?.url;
  const ytTitle=v.snippet.title;
  const vid=v.id.videoId, date=v.snippet.publishedAt;

  // Set background
  const bg=document.getElementById('heroBg');
  bg.classList.remove('loaded');
  bg.src=thumb;
  bg.onload=()=>bg.classList.add('loaded');

  // Basic info first
  document.getElementById('heroTitle').textContent=truncate(ytTitle,52);
  document.getElementById('heroDesc').textContent=v.snippet.description?truncate(v.snippet.description,140):'';
  document.getElementById('heroGenres').innerHTML='';
  document.getElementById('heroRating').innerHTML=`<span class="hero-year">${new Date(date).getFullYear()}</span>`;
  document.getElementById('heroContent').style.display='block';
  document.getElementById('heroPlayBtn').onclick=()=>openVideoFull(vid,ytTitle,date,'');
  document.getElementById('heroInfoBtn').onclick=()=>openVideoFull(vid,ytTitle,date,'');
  document.querySelectorAll('.hero-dot').forEach((d,j)=>d.classList.toggle('active',j===i));

  // Try OMDb
  const movieName=extractMovieTitle(ytTitle);
  const omdb=await fetchOMDb(movieName);
  if(omdb&&omdb.Response==='True'){
    document.getElementById('heroTitle').textContent=omdb.Title||truncate(ytTitle,52);
    document.getElementById('heroDesc').textContent=omdb.Plot&&omdb.Plot!=='N/A'?omdb.Plot:truncate(v.snippet.description||'',140);

    // Genres
    if(omdb.Genre&&omdb.Genre!=='N/A'){
      document.getElementById('heroGenres').innerHTML=omdb.Genre.split(',').slice(0,3).map(g=>
        `<span class="hero-genre-tag">${g.trim()}</span>`
      ).join('');
    }

    // Rating
    let ratingHtml='';
    if(omdb.imdbRating&&omdb.imdbRating!=='N/A')
      ratingHtml+=`<div class="hero-imdb">⭐ ${omdb.imdbRating}</div>`;
    if(omdb.Year&&omdb.Year!=='N/A')
      ratingHtml+=`<span class="hero-year">${omdb.Year}</span>`;
    if(omdb.Runtime&&omdb.Runtime!=='N/A')
      ratingHtml+=`<span class="hero-runtime">${omdb.Runtime}</span>`;
    document.getElementById('heroRating').innerHTML=ratingHtml;

    // Poster
    if(omdb.Poster&&omdb.Poster!=='N/A'){
      const poster=document.getElementById('heroPoster');
      const posterImg=document.getElementById('heroPosterImg');
      poster.classList.remove('loaded');
      posterImg.src=omdb.Poster;
      posterImg.onload=()=>poster.classList.add('loaded');
      document.getElementById('heroPlayBtn').onclick=()=>openVideoFull(vid,omdb.Title||ytTitle,date,omdb.Poster);
      document.getElementById('heroInfoBtn').onclick=()=>openVideoFull(vid,omdb.Title||ytTitle,date,omdb.Poster);
    }
  }
}

// Render posters
function isMobile(){ return window.innerWidth<600; }

async function renderPosters(videos){
  if(!videos||!videos.length){
    document.getElementById('postersWrap').innerHTML='<div class="error-msg">無法載入影片</div>';
    return;
  }

  // First render with YouTube thumbnails, then enhance with OMDb
  const wrap=document.getElementById('postersWrap');
  const isMob=isMobile();
  const containerClass=isMob?'posters-row':'posters-grid';
  const cardClass=isMob?'poster-card-h':'poster-card';

  // Initial render
  wrap.innerHTML=`<div class="${containerClass}" id="postersContainer">
    ${videos.map((v,idx)=>{
      const thumb=v.snippet.thumbnails.medium?.url||'';
      const vid=v.id.videoId, date=v.snippet.publishedAt;
      const title=truncate(v.snippet.title,30);
      return `<div class="${cardClass}" id="pcard-${idx}" onclick="openVideoFull('${vid}','${esc(v.snippet.title)}','${date}','')">
        <img src="${thumb}" alt="${esc(title)}" loading="lazy" id="pimg-${idx}">
        <div class="poster-play"></div>
        ${!isMob?`<div class="poster-overlay">
          <div class="poster-title">${title}</div>
          <div class="poster-rating">★ --</div>
        </div>`:''}
      </div>`;
    }).join('')}
  </div>`;

  // Enhance with OMDb in background
  videos.forEach(async(v,idx)=>{
    const movieName=extractMovieTitle(v.snippet.title);
    const omdb=await fetchOMDb(movieName);
    const card=document.getElementById(`pcard-${idx}`);
    if(!card) return;

    const vid=v.id.videoId, date=v.snippet.publishedAt;
    const finalTitle=omdb?.Title||v.snippet.title;
    const posterUrl=omdb?.Poster&&omdb.Poster!=='N/A'?omdb.Poster:'';
    const rating=omdb?.imdbRating&&omdb.imdbRating!=='N/A'?omdb.imdbRating:'';

    // Update click handler
    card.onclick=()=>openVideoFull(vid,finalTitle,date,posterUrl);

    if(posterUrl){
      const img=document.getElementById(`pimg-${idx}`);
      if(img){ img.src=posterUrl; }
    }

    if(!isMob){
      const overlay=card.querySelector('.poster-overlay');
      if(overlay){
        overlay.innerHTML=`
          <div class="poster-title">${truncate(finalTitle,28)}</div>
          <div class="poster-rating">${rating?'⭐ '+rating:''}</div>
        `;
      }
    }
  });
}

let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{ if(allVideos.length) renderPosters(allVideos); },300);
});

// Fetch YouTube
async function fetchTrailers(query,maxResults=18){
  const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&maxResults=${maxResults}&order=date&relevanceLanguage=zh-Hant&key=${YT_KEY}`;
  try{
    const res=await fetch(url);
    const data=await res.json();
    if(data.error) throw new Error(data.error.message);
    return data.items||[];
  }catch(e){ console.error(e); return null; }
}

async function loadTrailers(query){
  document.getElementById('postersWrap').innerHTML='<div class="loading"><span class="loading-dots">載入中</span></div>';
  document.getElementById('heroLoading').style.display='flex';
  document.getElementById('heroContent').style.display='none';
  document.getElementById('heroBg').classList.remove('loaded');
  document.getElementById('heroPoster').classList.remove('loaded');
  omdbCache={};
  const videos=await fetchTrailers(query);
  if(!videos){
    document.getElementById('postersWrap').innerHTML='<div class="error-msg">API 載入失敗</div>';
    document.getElementById('heroLoading').innerHTML='<span style="color:#e50914">載入失敗</span>';
    return;
  }
  allVideos=videos;
  buildHero(videos);
  renderPosters(videos);
}

function loadCategory(btn,query){
  document.querySelectorAll('.cat-btn,.nav-link').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadTrailers(query);
  if(menuOpen) toggleMenu();
}
function loadCategoryMobile(query){
  document.querySelectorAll('.cat-btn,.nav-link').forEach(b=>b.classList.remove('active'));
  loadTrailers(query);
  toggleMenu();
}
function searchTrailers(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q) return;
  document.querySelectorAll('.cat-btn,.nav-link').forEach(b=>b.classList.remove('active'));
  loadTrailers(q+' trailer');
}
function mobileSearch(){
  const q=document.getElementById('mobileSearchInput').value.trim();
  if(!q) return;
  toggleMenu();
  loadTrailers(q+' trailer');
}
document.getElementById('searchInput').addEventListener('keydown',e=>{ if(e.key==='Enter') searchTrailers(); });
document.getElementById('mobileSearchInput').addEventListener('keydown',e=>{ if(e.key==='Enter') mobileSearch(); });

loadTrailers('電影預告片 2025 官方');
</script>
</body>
</html>
