<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>預告星球 — 最新電影預告片</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0f0f; --surface:#1a1a1a; --card:#1e1e1e;
    --accent:#e50914; --gold:#f5c518; --text:#f5f5f1;
    --muted:#aaa; --border:#2a2a2a; --nav-h:64px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;overflow-x:hidden;}

  /* NAVBAR */
  .navbar{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav-h);padding:0 5vw;display:flex;align-items:center;justify-content:space-between;gap:16px;background:linear-gradient(to bottom,rgba(0,0,0,0.92) 0%,transparent 100%);transition:background 0.4s;}
  .navbar.scrolled{background:rgba(15,15,15,0.98);backdrop-filter:blur(8px);}
  .nav-logo{font-size:clamp(22px,3vw,30px);font-weight:900;color:var(--accent);letter-spacing:-1px;cursor:pointer;flex-shrink:0;}
  .nav-links{display:flex;gap:20px;}
  .nav-link{font-size:13px;color:rgba(255,255,255,0.7);cursor:pointer;border:none;background:none;font-family:'Noto Sans TC',sans-serif;transition:color 0.2s;padding:4px 0;white-space:nowrap;}
  .nav-link:hover,.nav-link.active{color:#fff;}
  .nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .nav-right input{background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.25);color:#fff;padding:7px 14px;font-family:'Noto Sans TC',sans-serif;font-size:13px;outline:none;width:clamp(120px,14vw,200px);border-radius:20px;transition:all 0.2s;}
  .nav-right input:focus{border-color:#fff;}
  .nav-right input::placeholder{color:rgba(255,255,255,0.35);}
  .nav-right button{background:var(--accent);border:none;color:#fff;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;border-radius:20px;transition:background 0.2s;white-space:nowrap;}
  .nav-right button:hover{background:#c40812;}
  .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none;flex-shrink:0;}
  .hamburger span{display:block;width:24px;height:2px;background:#fff;border-radius:2px;transition:all 0.3s;}
  .hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
  .hamburger.open span:nth-child(2){opacity:0;}
  .hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}

  /* MOBILE MENU */
  .mobile-menu{display:none;position:fixed;top:var(--nav-h);left:0;right:0;background:rgba(15,15,15,0.98);backdrop-filter:blur(8px);z-index:199;padding:16px 5vw 20px;flex-direction:column;gap:2px;border-bottom:1px solid var(--border);}
  .mobile-menu.open{display:flex;}
  .mobile-menu-link{background:none;border:none;color:rgba(255,255,255,0.8);font-family:'Noto Sans TC',sans-serif;font-size:15px;padding:13px 8px;text-align:left;cursor:pointer;border-bottom:1px solid var(--border);transition:color 0.2s;}
  .mobile-menu-link:hover{color:#fff;}
  .mobile-search{display:flex;gap:8px;margin-top:14px;}
  .mobile-search input{flex:1;background:rgba(255,255,255,0.08);border:1px solid var(--border);color:#fff;padding:10px 14px;font-family:'Noto Sans TC',sans-serif;font-size:14px;outline:none;border-radius:4px;}
  .mobile-search input::placeholder{color:var(--muted);}
  .mobile-search button{background:var(--accent);border:none;color:#fff;padding:10px 18px;font-family:'Noto Sans TC',sans-serif;font-weight:700;font-size:13px;cursor:pointer;border-radius:4px;}

  /* HERO */
  .hero{position:relative;width:100%;height:100svh;min-height:520px;max-height:920px;overflow:hidden;background:#000;}
  .hero-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1.2s ease;}
  .hero-bg.loaded{opacity:0.5;}
  .hero-gradient{position:absolute;inset:0;background:linear-gradient(to right,rgba(15,15,15,0.97) 0%,rgba(15,15,15,0.55) 55%,rgba(15,15,15,0.05) 100%),linear-gradient(to top,rgba(15,15,15,1) 0%,rgba(15,15,15,0.0) 50%);}
  .hero-content{position:absolute;bottom:clamp(100px,16vh,200px);left:5vw;max-width:min(580px,88vw);animation:heroIn 0.9s ease both;}
  @keyframes heroIn{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
  .hero-official-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(229,9,20,0.9);color:#fff;font-size:10px;font-weight:700;padding:4px 12px;border-radius:3px;margin-bottom:14px;font-family:'Space Mono',monospace;letter-spacing:1px;}
  .hero-genre-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
  .hero-genre-tag{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.8);font-size:10px;padding:3px 10px;border-radius:12px;font-weight:500;}
  .hero-title{font-size:clamp(26px,5.5vw,62px);font-weight:900;line-height:1.05;margin-bottom:12px;text-shadow:0 2px 16px rgba(0,0,0,0.7);letter-spacing:-1px;}
  .hero-rating{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
  .hero-imdb{display:flex;align-items:center;gap:6px;background:var(--gold);color:#000;padding:3px 10px;border-radius:4px;font-size:12px;font-weight:900;font-family:'Space Mono',monospace;}
  .hero-year,.hero-runtime{font-size:13px;color:rgba(255,255,255,0.6);font-weight:300;}
  .hero-desc{font-size:clamp(12px,1.5vw,15px);line-height:1.75;color:rgba(255,255,255,0.75);margin-bottom:28px;font-weight:300;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .hero-buttons{display:flex;gap:12px;flex-wrap:wrap;}
  .hero-btn-play{display:inline-flex;align-items:center;gap:10px;background:#fff;color:#000;border:none;padding:clamp(11px,1.6vh,15px) clamp(20px,3vw,32px);font-size:clamp(13px,1.6vw,17px);font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.2s;border-radius:6px;}
  .hero-btn-play:hover{background:rgba(255,255,255,0.82);transform:scale(1.04);}
  .hero-btn-play::before{content:'▶';font-size:13px;}
  .hero-btn-info{display:inline-flex;align-items:center;gap:10px;background:rgba(109,109,110,0.65);color:#fff;border:none;padding:clamp(11px,1.6vh,15px) clamp(20px,3vw,32px);font-size:clamp(13px,1.6vw,17px);font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.2s;border-radius:6px;}
  .hero-btn-info:hover{background:rgba(109,109,110,0.45);transform:scale(1.04);}
  .hero-btn-info::before{content:'ℹ';}
  .hero-indicators{position:absolute;bottom:clamp(50px,9vh,90px);right:5vw;display:flex;gap:6px;}
  .hero-dot{width:14px;height:3px;background:rgba(255,255,255,0.3);cursor:pointer;border:none;transition:all 0.3s;border-radius:2px;}
  .hero-dot.active{background:#fff;width:24px;}
  .hero-poster{position:absolute;right:6vw;bottom:clamp(80px,14vh,160px);width:clamp(100px,12vw,160px);border-radius:8px;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,0.8);border:2px solid rgba(255,255,255,0.1);opacity:0;transition:opacity 0.8s ease;}
  .hero-poster.loaded{opacity:1;}
  .hero-poster img{width:100%;display:block;}
  .hero-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:13px;color:var(--muted);letter-spacing:3px;}

  /* AD TOP */
  .ad-top{background:var(--surface);text-align:center;padding:10px;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:2px;border-bottom:1px solid var(--border);}
  .ad-top span{border:1px dashed var(--border);padding:4px 16px;display:inline-block;}

  /* CATEGORY BAR */
  .category-bar{background:var(--bg);padding:14px 5vw;display:flex;gap:8px;overflow-x:auto;flex-wrap:nowrap;border-bottom:1px solid var(--border);position:sticky;top:var(--nav-h);z-index:50;scrollbar-width:none;}
  .category-bar::-webkit-scrollbar{display:none;}
  .cat-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 16px;font-family:'Noto Sans TC',sans-serif;font-size:clamp(11px,1.3vw,13px);cursor:pointer;transition:all 0.2s;border-radius:20px;white-space:nowrap;flex-shrink:0;}
  .cat-btn:hover,.cat-btn.active{border-color:#fff;color:#fff;background:rgba(255,255,255,0.08);}
  .cinema-tab{background:rgba(245,197,24,0.15);border-color:var(--gold);color:var(--gold);}
  .cinema-tab:hover,.cinema-tab.active{background:var(--gold);color:#000;border-color:var(--gold);}

  /* CONTENT */
  .content-section{padding:clamp(24px,4vw,48px) 5vw;}
  .row-title{font-size:clamp(17px,2.2vw,22px);font-weight:700;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;}
  .row-title-left{display:flex;align-items:center;gap:12px;}
  .official-badge{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:3px;font-family:'Space Mono',monospace;letter-spacing:1px;}
  .row-title-sub{font-size:13px;color:#46d369;font-weight:400;cursor:pointer;}
  .row-title-sub:hover{color:#fff;}

  /* POSTERS GRID */
  .posters-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(120px,14vw,180px),1fr));gap:clamp(8px,1.2vw,16px);margin-bottom:48px;}
  .poster-card{cursor:pointer;border-radius:8px;overflow:hidden;position:relative;background:var(--card);transition:transform 0.3s,box-shadow 0.3s;aspect-ratio:2/3;}
  .poster-card:hover{transform:scale(1.06) translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,0.7);z-index:5;}
  .poster-card img{width:100%;height:100%;object-fit:cover;display:block;background:#222;}
  .poster-card .poster-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.92) 0%,rgba(0,0,0,0.0) 50%);opacity:0;transition:opacity 0.3s;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;}
  .poster-card:hover .poster-overlay{opacity:1;}
  .poster-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);width:44px;height:44px;background:rgba(229,9,20,0.9);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.3s,transform 0.3s;}
  .poster-card:hover .poster-play{opacity:1;transform:translate(-50%,-50%);}
  .poster-play::after{content:'';border-left:15px solid #fff;border-top:9px solid transparent;border-bottom:9px solid transparent;margin-left:3px;}
  .poster-title{font-size:12px;font-weight:700;line-height:1.3;color:#fff;margin-bottom:3px;}
  .poster-rating{font-size:10px;color:var(--gold);font-family:'Space Mono',monospace;}
  .poster-official{position:absolute;top:8px;left:8px;background:rgba(229,9,20,0.85);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;font-family:'Space Mono',monospace;}
  .posters-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;margin-bottom:40px;scrollbar-width:thin;scrollbar-color:#444 transparent;}
  .posters-row::-webkit-scrollbar{height:3px;}
  .posters-row::-webkit-scrollbar-thumb{background:#444;border-radius:2px;}
  .poster-card-h{flex-shrink:0;width:clamp(100px,28vw,140px);aspect-ratio:2/3;border-radius:8px;overflow:hidden;cursor:pointer;position:relative;background:var(--card);transition:transform 0.3s;}
  .poster-card-h:hover{transform:scale(1.06);}
  .poster-card-h img{width:100%;height:100%;object-fit:cover;display:block;background:#222;}
  .poster-card-h .poster-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);width:36px;height:36px;background:rgba(229,9,20,0.9);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:all 0.3s;}
  .poster-card-h:hover .poster-play{opacity:1;transform:translate(-50%,-50%);}
  .poster-card-h .poster-play::after{content:'';border-left:12px solid #fff;border-top:7px solid transparent;border-bottom:7px solid transparent;margin-left:2px;}
  .poster-card-h .poster-official{position:absolute;top:6px;left:6px;background:rgba(229,9,20,0.85);color:#fff;font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;font-family:'Space Mono',monospace;}

  /* ── CINEMA SECTION ── */
  .cinema-section{padding:clamp(24px,4vw,48px) 5vw;}
  .cinema-region-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
  .region-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 16px;font-family:'Noto Sans TC',sans-serif;font-size:12px;cursor:pointer;transition:all 0.2s;border-radius:20px;white-space:nowrap;}
  .region-btn:hover,.region-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(245,197,24,0.08);}
  .cinema-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:40px;}
  .cinema-card{background:var(--card);border-radius:10px;padding:16px;cursor:pointer;transition:all 0.2s;border:1px solid var(--border);text-decoration:none;display:block;}
  .cinema-card:hover{background:#252525;border-color:var(--gold);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4);}
  .cinema-chain{font-size:10px;font-weight:700;color:var(--accent);font-family:'Space Mono',monospace;letter-spacing:1px;margin-bottom:6px;}
  .cinema-name{font-size:15px;font-weight:700;margin-bottom:4px;}
  .cinema-address{font-size:12px;color:var(--muted);font-weight:300;line-height:1.5;margin-bottom:10px;}
  .cinema-map-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(245,197,24,0.15);color:var(--gold);border:1px solid rgba(245,197,24,0.3);padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;font-family:'Space Mono',monospace;transition:all 0.2s;}
  .cinema-card:hover .cinema-map-btn{background:var(--gold);color:#000;border-color:var(--gold);}
  .cinema-map-btn::before{content:'📍';font-size:12px;}

  /* AD MID */
  .ad-mid{margin:0 5vw 40px;background:var(--surface);border:1px dashed var(--border);text-align:center;padding:clamp(20px,3vw,36px);font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:2px;border-radius:8px;}

  /* MOVIE DETAIL MODAL */
  .detail-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:500;overflow-y:auto;}
  .detail-modal.open{display:block;}
  .detail-inner{max-width:900px;margin:0 auto;padding:80px 5vw 40px;}
  .detail-close{position:fixed;top:20px;right:5vw;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:8px 20px;font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;border-radius:4px;z-index:501;transition:background 0.2s;}
  .detail-close:hover{background:rgba(255,255,255,0.2);}
  .detail-hero{display:flex;gap:clamp(20px,4vw,40px);margin-bottom:32px;align-items:flex-start;}
  .detail-poster{width:clamp(140px,22vw,240px);flex-shrink:0;border-radius:10px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.8);}
  .detail-poster img{width:100%;display:block;}
  .detail-poster-placeholder{width:clamp(140px,22vw,240px);flex-shrink:0;aspect-ratio:2/3;border-radius:10px;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;}
  .detail-info{flex:1;}
  .detail-official-tag{display:inline-block;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:3px 12px;border-radius:3px;margin-bottom:12px;font-family:'Space Mono',monospace;letter-spacing:1px;}
  .detail-title{font-size:clamp(22px,4vw,40px);font-weight:900;line-height:1.1;margin-bottom:12px;letter-spacing:-0.5px;}
  .detail-meta-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
  .detail-imdb{background:var(--gold);color:#000;padding:4px 12px;border-radius:4px;font-size:13px;font-weight:900;font-family:'Space Mono',monospace;}
  .detail-year,.detail-runtime,.detail-rated{font-size:13px;color:var(--muted);font-weight:300;}
  .detail-genres{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .detail-genre{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);font-size:11px;padding:4px 12px;border-radius:12px;font-weight:500;}
  .detail-plot{font-size:clamp(13px,1.6vw,16px);line-height:1.8;color:rgba(255,255,255,0.8);margin-bottom:20px;font-weight:300;}
  .detail-cast{font-size:13px;color:var(--muted);margin-bottom:8px;font-weight:300;line-height:1.6;}
  .detail-cast strong{color:rgba(255,255,255,0.7);font-weight:500;}
  .detail-play-btn{display:inline-flex;align-items:center;gap:10px;background:var(--accent);color:#fff;border:none;padding:14px 28px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;border-radius:8px;transition:all 0.2s;margin-top:8px;}
  .detail-play-btn:hover{background:#c40812;transform:scale(1.04);}
  .detail-play-btn::before{content:'▶';font-size:14px;}
  .detail-video-wrap{margin-top:32px;border-radius:10px;overflow:hidden;}
  .detail-video-wrap iframe{width:100%;aspect-ratio:16/9;border:none;display:block;}

  /* VIDEO MODAL */
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.94);z-index:1000;align-items:center;justify-content:center;padding:16px;}
  .modal.open{display:flex;}
  .modal-inner{width:100%;max-width:min(920px,95vw);position:relative;}
  .modal-close{position:absolute;top:-44px;right:0;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:6px 16px;font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;border-radius:4px;transition:background 0.2s;}
  .modal-close:hover{background:rgba(255,255,255,0.2);}
  .modal-video{width:100%;aspect-ratio:16/9;border:none;border-radius:8px;}

  /* LOADING / ERROR */
  .loading{text-align:center;padding:80px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:3px;font-size:12px;}
  .loading-dots::after{content:'';animation:dots 1.5s infinite;}
  @keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}
  .error-msg{text-align:center;padding:40px;color:var(--accent);font-size:12px;font-family:'Space Mono',monospace;letter-spacing:2px;}

  /* FOOTER */
  footer{padding:clamp(24px,4vw,40px) 5vw;border-top:1px solid var(--border);font-size:12px;color:var(--muted);font-weight:300;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:8px;}

  /* BREAKPOINTS */
  @media(max-width:900px){.nav-links,.nav-right{display:none;}.hamburger{display:flex;}.hero-poster{display:none;}}
  @media(max-width:600px){:root{--nav-h:54px;}.hero{max-height:72svh;min-height:420px;}.hero-content{bottom:clamp(70px,12vh,110px);}.hero-desc,.hero-btn-info{display:none;}.hero-indicators{bottom:24px;}.detail-hero{flex-direction:column;}.detail-poster,.detail-poster-placeholder{width:clamp(120px,40vw,180px);}footer{flex-direction:column;text-align:center;}}
  @media(max-width:380px){.hero-title{font-size:22px;}.hero-btn-play{font-size:13px;padding:10px 18px;}}
  @media(min-width:1400px){.navbar,.category-bar,.content-section,.cinema-section,.ad-mid,footer{padding-left:80px;padding-right:80px;}.hero-content{left:80px;}.hero-poster,.hero-indicators{right:80px;}}
</style>
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="nav-logo" onclick="showPage('home')">預告星球</div>
  <div class="nav-links">
    <button class="nav-link active" id="nl-home" onclick="showPage('home')">首頁</button>
    <button class="nav-link" onclick="loadCategory(this,'動作')">動作</button>
    <button class="nav-link" onclick="loadCategory(this,'動畫')">動畫</button>
    <button class="nav-link" onclick="loadCategory(this,'恐怖')">恐怖</button>
    <button class="nav-link" onclick="loadCategory(this,'漫威DC')">漫威DC</button>
    <button class="nav-link" id="nl-cinema" onclick="showPage('cinema')">🎭 全台電影院</button>
  </div>
  <div class="nav-right">
    <input type="text" id="searchInput" placeholder="🔍 搜尋電影...">
    <button onclick="searchTrailers()">搜尋</button>
  </div>
  <button class="hamburger" id="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
</nav>

function formatDate(s){ const d=new Date(s); return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`; }
function truncate(s,n){ return s&&s.length>n?s.slice(0,n)+'…':(s||''); }
function esc(s){ return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function isOfficialTrailer(title,channelTitle){
  const t=(title+' '+channelTitle).toLowerCase();
  const bad=['reaction','review','breakdown','explained','fan made','fan trailer','parody'];
  const good=['official trailer','official teaser','official clip','official movie trailer'];
  return good.some(k=>t.includes(k))&&!bad.some(k=>t.includes(k));
}

function extractMovieTitle(ytTitle){
  return ytTitle.replace(/official.*trailer.*/i,'').replace(/official.*teaser.*/i,'').replace(/\|[^|]*$/,'').replace(/[-–—][^-–—]*$/,'').replace(/\(.*?\)/g,'').replace(/【.*?】/g,'').replace(/trailer|teaser|預告片?|官方|正式/gi,'').replace(/\s+/g,' ').trim().toLowerCase();
}

function getCleanTitle(ytTitle){
  return ytTitle.replace(/official.*trailer.*/i,'').replace(/official.*teaser.*/i,'').replace(/\|[^|]*$/,'').replace(/[-–—][^-–—]{0,30}$/,'').replace(/\(.*?\)/g,'').replace(/【.*?】/g,'').replace(/trailer|teaser|預告片?|官方|正式/gi,'').replace(/\s+/g,' ').trim();
}

function deduplicateVideos(videos){
  const seen=new Set();
  return videos.filter(v=>{ const k=extractMovieTitle(v.snippet.title); if(!k||seen.has(k)) return false; seen.add(k); return true; });
}

// OMDb
async function fetchOMDb(title){
  if(!title) return null;
  const key=title.toLowerCase().trim();
  if(omdbCache[key]) return omdbCache[key];
  try{
    const r=await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(title)}&apikey=${OMDB_KEY}`);
    const d=await r.json();
    if(d.Response==='True'){ omdbCache[key]=d; return d; }
  }catch(e){}
  return null;
}

async function openDetail(videoId, ytTitle, date){
  currentDetailVideo={videoId,ytTitle,date};

  document.getElementById('detailPosterWrap').innerHTML=`<div class="detail-poster-placeholder">🎬</div>`;
  document.getElementById('detailVideoWrap').style.display='none';
  document.getElementById('detailIframe').src='';
  document.getElementById('detailPlayBtn').onclick=()=>playDetailVideo();
  document.getElementById('detailModal').classList.add('open');
  document.body.style.overflow='hidden';

  const omdb=await fetchOMDb(getCleanTitle(ytTitle));
  if(omdb?.Response==='True'){
    document.getElementById('detailTitle').textContent=omdb.Title||getCleanTitle(ytTitle);
    let meta='';
    if(omdb.imdbRating&&omdb.imdbRating!=='N/A') meta+=`<span class="detail-imdb">⭐ ${omdb.imdbRating}/10</span>`;
    if(omdb.Year&&omdb.Year!=='N/A') meta+=`<span class="detail-year">${omdb.Year}</span>`;
    if(omdb.Runtime&&omdb.Runtime!=='N/A') meta+=`<span class="detail-runtime">${omdb.Runtime}</span>`;
    if(omdb.Rated&&omdb.Rated!=='N/A') meta+=`<span class="detail-rated">${omdb.Rated}</span>`;
    document.getElementById('detailMeta').innerHTML=meta;
    if(omdb.Genre&&omdb.Genre!=='N/A')
      document.getElementById('detailGenres').innerHTML=omdb.Genre.split(',').map(g=>`<span class="detail-genre">${g.trim()}</span>`).join('');
    document.getElementById('detailPlot').textContent=omdb.Plot&&omdb.Plot!=='N/A'?omdb.Plot:'暫無簡介';
    let cast='';
    if(omdb.Director&&omdb.Director!=='N/A') cast+=`<strong>導演：</strong>${omdb.Director}<br>`;
    if(omdb.Actors&&omdb.Actors!=='N/A') cast+=`<strong>演員：</strong>${omdb.Actors}`;
    document.getElementById('detailCast').innerHTML=cast;
    if(omdb.Poster&&omdb.Poster!=='N/A')
      document.getElementById('detailPosterWrap').innerHTML=`<div class="detail-poster"><img src="${omdb.Poster}" alt="${omdb.Title}"></div>`;
  } else {
    document.getElementById('detailPlot').textContent='暫無電影資訊';
  }
}

// ── HERO ──
function buildHero(videos){
  const hv=videos.slice(0,6);
  document.getElementById('heroLoading').style.display='none';
  document.getElementById('heroIndicators').innerHTML=hv.map((_,i)=>`<button class="hero-dot ${i===0?'active':''}" onclick="setHeroVideo(${i})"></button>`).join('');
  setHeroVideo(0,hv);
  if(heroTimer) clearInterval(heroTimer);
  heroTimer=setInterval(()=>{ heroIndex=(heroIndex+1)%hv.length; setHeroVideo(heroIndex,hv); },8000);
}

async function setHeroVideo(i,videos){
  const arr=videos||allVideos.slice(0,6);
  const v=arr[i]; if(!v) return;
  heroIndex=i;
  const thumb=v.snippet.thumbnails.maxres?.url||v.snippet.thumbnails.high?.url||v.snippet.thumbnails.medium?.url;
  const ytTitle=v.snippet.title, vid=v.id.videoId, date=v.snippet.publishedAt;
  const bg=document.getElementById('heroBg');
  bg.classList.remove('loaded'); bg.src=thumb; bg.onload=()=>bg.classList.add('loaded');
  document.getElementById('heroTitle').textContent=truncate(getCleanTitle(ytTitle),52);
  document.getElementById('heroDesc').textContent=truncate(v.snippet.description||'',140);
  document.getElementById('heroGenres').innerHTML='';
  document.getElementById('heroRating').innerHTML=`<span class="hero-year">${new Date(date).getFullYear()}</span>`;
  document.getElementById('heroContent').style.display='block';
  document.getElementById('heroPlayBtn').onclick=()=>openVideoModal(vid);
  document.getElementById('heroInfoBtn').onclick=()=>openDetail(vid,ytTitle,date);
  document.querySelectorAll('.hero-dot').forEach((d,j)=>d.classList.toggle('active',j===i));
  const omdb=await fetchOMDb(getCleanTitle(ytTitle));
  if(omdb?.Response==='True'){
    document.getElementById('heroTitle').textContent=omdb.Title||getCleanTitle(ytTitle);
    document.getElementById('heroDesc').textContent=omdb.Plot&&omdb.Plot!=='N/A'?omdb.Plot:truncate(v.snippet.description||'',140);
    if(omdb.Genre&&omdb.Genre!=='N/A')
      document.getElementById('heroGenres').innerHTML=omdb.Genre.split(',').slice(0,3).map(g=>`<span class="hero-genre-tag">${g.trim()}</span>`).join('');
    let rHtml='';
    if(omdb.imdbRating&&omdb.imdbRating!=='N/A') rHtml+=`<div class="hero-imdb">⭐ ${omdb.imdbRating}</div>`;
    if(omdb.Year&&omdb.Year!=='N/A') rHtml+=`<span class="hero-year">${omdb.Year}</span>`;
    if(omdb.Runtime&&omdb.Runtime!=='N/A') rHtml+=`<span class="hero-runtime">${omdb.Runtime}</span>`;
    document.getElementById('heroRating').innerHTML=rHtml;
    if(omdb.Poster&&omdb.Poster!=='N/A'){
      const p=document.getElementById('heroPoster'),pi=document.getElementById('heroPosterImg');
      p.classList.remove('loaded'); pi.src=omdb.Poster; pi.onload=()=>p.classList.add('loaded');
    }
    document.getElementById('heroInfoBtn').onclick=()=>openDetail(vid,omdb.Title||ytTitle,date);
  }
}

    }).join('')}

    const cleanTitle=getCleanTitle(v.snippet.title);
    const omdb=await fetchOMDb(cleanTitle);
    const card=document.getElementById(`pcard-${idx}`); if(!card) return;
    const vid=v.id.videoId, date=v.snippet.publishedAt;
    const finalTitle=omdb?.Title||cleanTitle;
    const posterUrl=omdb?.Poster&&omdb.Poster!=='N/A'?omdb.Poster:'';
    const rating=omdb?.imdbRating&&omdb.imdbRating!=='N/A'?omdb.imdbRating:'';
    card.onclick=()=>openDetail(vid,finalTitle,date);
    if(posterUrl){ const img=document.getElementById(`pimg-${idx}`); if(img) img.src=posterUrl; }
    if(!isMob){
      const overlay=card.querySelector('.poster-overlay');
      if(overlay) overlay.innerHTML=`<div class="poster-title">${truncate(finalTitle,28)}</div><div class="poster-rating">${rating?'⭐ '+rating:''}</div>`;
    }
  });
}

let resizeTimer;
window.addEventListener('resize',()=>{ clearTimeout(resizeTimer); resizeTimer=setTimeout(()=>{ if(allVideos.length) renderPosters(allVideos); },300); });

// ── CINEMA ──
function renderCinema(region){
  // Update tabs
  document.getElementById('regionTabs').innerHTML=REGIONS.map(r=>
    `<button class="region-btn ${r===region?'active':''}" onclick="renderCinema('${r}')">${r}</button>`
  ).join('');
  const list=region==='全部'?CINEMAS:CINEMAS.filter(c=>c.region===region);
  document.getElementById('cinemaGrid').innerHTML=list.map(c=>`
    <a class="cinema-card" href="${c.map}" target="_blank" rel="noopener">
      <div class="cinema-chain">${c.chain}</div>
      <div class="cinema-name">${c.name}</div>
      <div class="cinema-address">${c.address}</div>
      <div class="cinema-map-btn">Google Maps 導航</div>
    </a>
  `).join('');
}

// ── FETCH ──
async function fetchOfficialTrailers(query,maxResults=30){
  const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query+' "official trailer"')}&type=video&maxResults=${maxResults}&order=date&key=${YT_KEY}`;
  try{
    const res=await fetch(url);
    const data=await res.json();
    if(data.error) throw new Error(data.error.message);
    const items=data.items||[];
    return deduplicateVideos(items.filter(v=>isOfficialTrailer(v.snippet.title,v.snippet.channelTitle)));
  }catch(e){ console.error(e); return null; }
}

async function loadTrailers(category){
  document.getElementById('postersWrap').innerHTML='<div class="loading"><span class="loading-dots">載入中</span></div>';
  document.getElementById('heroLoading').style.display='flex';
  document.getElementById('heroContent').style.display='none';
  document.getElementById('heroBg').classList.remove('loaded');
  document.getElementById('heroPoster').classList.remove('loaded');
  omdbCache={};
  showPage('home');
  const query=CATEGORY_QUERIES[category]||`${category} official trailer 2025`;
  const videos=await fetchOfficialTrailers(query);
  if(!videos||!videos.length){ document.getElementById('postersWrap').innerHTML='<div class="error-msg">找不到官方預告片</div>'; document.getElementById('heroLoading').innerHTML='<span style="color:#e50914">載入失敗</span>'; return; }
  allVideos=videos;
  buildHero(videos);
  renderPosters(videos);
}

function loadCategory(btn,category){
  document.querySelectorAll('.cat-btn,.nav-link').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadTrailers(category);
  if(menuOpen) toggleMenu();
}
function loadCategoryMobile(category){ document.querySelectorAll('.cat-btn,.nav-link').forEach(b=>b.classList.remove('active')); loadTrailers(category); toggleMenu(); }
function searchTrailers(){ const q=document.getElementById('searchInput').value.trim(); if(!q) return; document.querySelectorAll('.cat-btn,.nav-link').forEach(b=>b.classList.remove('active')); loadTrailers(q); }
function mobileSearch(){ const q=document.getElementById('mobileSearchInput').value.trim(); if(!q) return; toggleMenu(); loadTrailers(q); }
document.getElementById('searchInput').addEventListener('keydown',e=>{ if(e.key==='Enter') searchTrailers(); });
document.getElementById('mobileSearchInput').addEventListener('keydown',e=>{ if(e.key==='Enter') mobileSearch(); });

loadTrailers('最新');
</script>
