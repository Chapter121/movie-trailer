<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>預告星球 — 最新電影預告片</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --accent: #e8c84a;
    --accent2: #ff6b35;
    --text: #f0efe8;
    --muted: #888899;
    --border: #2a2a3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 背景粒子效果 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(232,200,74,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(255,107,53,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* 廣告版位 - 頂部 */
  .ad-top {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    text-align: center;
    padding: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    position: relative;
    z-index: 10;
  }

  .ad-top span {
    border: 1px dashed var(--border);
    padding: 4px 16px;
    display: inline-block;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    padding: 40px 40px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .logo-main {
    font-size: 32px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -1px;
    line-height: 1;
  }

  .logo-sub {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .header-right {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: right;
  }

  .live-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #4caf50;
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* 搜尋列 */
  .search-bar {
    position: relative;
    z-index: 10;
    padding: 20px 40px;
    display: flex;
    gap: 12px;
    align-items: center;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .search-bar input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-bar input:focus {
    border-color: var(--accent);
  }

  .search-bar input::placeholder {
    color: var(--muted);
  }

  .btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 10px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .btn:hover {
    background: var(--accent2);
    transform: translateY(-1px);
  }

  .filter-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* 主內容 */
  main {
    position: relative;
    z-index: 10;
    padding: 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* 精選大預告 */
  .featured {
    margin-bottom: 60px;
  }

  .featured-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 2px;
    background: var(--border);
  }

  .featured-main {
    background: var(--card);
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }

  .featured-main .thumbnail {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }

  .featured-main:hover .thumbnail {
    transform: scale(1.03);
  }

  .featured-main .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 50%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 24px;
  }

  .play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 64px;
    height: 64px;
    background: rgba(232,200,74,0.9);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .play-btn::after {
    content: '';
    border-left: 22px solid var(--bg);
    border-top: 14px solid transparent;
    border-bottom: 14px solid transparent;
    margin-left: 4px;
  }

  .featured-main:hover .play-btn {
    opacity: 1;
  }

  .video-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .video-title {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .video-meta {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* 側邊小預告 */
  .featured-side {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .side-card {
    background: var(--card);
    display: flex;
    gap: 0;
    cursor: pointer;
    overflow: hidden;
    position: relative;
    transition: background 0.2s;
  }

  .side-card:hover {
    background: #1f1f2e;
  }

  .side-card .thumb {
    width: 140px;
    flex-shrink: 0;
    object-fit: cover;
    aspect-ratio: 16/9;
  }

  .side-card .info {
    padding: 12px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
  }

  .side-card .info .tag {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--accent2);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .side-card .info .title {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.4;
  }

  .side-card .info .meta {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  /* 一般影片格線 */
  .videos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 2px;
    background: var(--border);
    margin-bottom: 40px;
  }

  .video-card {
    background: var(--card);
    cursor: pointer;
    overflow: hidden;
    position: relative;
    transition: background 0.2s;
  }

  .video-card:hover {
    background: #1f1f2e;
  }

  .video-card .thumb-wrap {
    position: relative;
    overflow: hidden;
  }

  .video-card .thumb {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }

  .video-card:hover .thumb {
    transform: scale(1.04);
  }

  .video-card .play-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .video-card:hover .play-overlay {
    opacity: 1;
  }

  .mini-play {
    width: 48px;
    height: 48px;
    background: rgba(232,200,74,0.9);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mini-play::after {
    content: '';
    border-left: 16px solid var(--bg);
    border-top: 10px solid transparent;
    border-bottom: 10px solid transparent;
    margin-left: 3px;
  }

  .video-card .card-info {
    padding: 14px;
  }

  .video-card .card-tag {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .video-card .card-title {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 6px;
  }

  .video-card .card-meta {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  /* 廣告版位 - 中間 */
  .ad-middle {
    background: var(--surface);
    border: 1px dashed var(--border);
    text-align: center;
    padding: 40px;
    margin: 40px 0;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  /* 影片 Modal */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal.open {
    display: flex;
  }

  .modal-inner {
    width: 100%;
    max-width: 900px;
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: -40px;
    right: 0;
    background: none;
    border: none;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 2px;
  }

  .modal-close:hover {
    color: var(--accent);
  }

  .modal-video {
    width: 100%;
    aspect-ratio: 16/9;
    border: none;
  }

  .modal-title {
    margin-top: 16px;
    font-size: 20px;
    font-weight: 700;
  }

  .modal-meta {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 80px 40px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    letter-spacing: 3px;
    font-size: 13px;
  }

  .loading-dots::after {
    content: '';
    animation: dots 1.5s infinite;
  }

  @keyframes dots {
    0% { content: ''; }
    33% { content: '.'; }
    66% { content: '..'; }
    100% { content: '...'; }
  }

  /* Footer */
  footer {
    position: relative;
    z-index: 10;
    border-top: 1px solid var(--border);
    padding: 30px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .tmdb-credit {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* 廣告版位 - 側邊 */
  .layout-with-sidebar {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 40px;
    align-items: start;
  }

  .ad-sidebar {
    background: var(--surface);
    border: 1px dashed var(--border);
    padding: 20px;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    position: sticky;
    top: 20px;
  }

  .ad-sidebar-inner {
    height: 600px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    border: 1px dashed var(--border);
  }

  /* Error */
  .error-msg {
    text-align: center;
    padding: 60px;
    font-family: 'Space Mono', monospace;
    color: var(--accent2);
    font-size: 13px;
    letter-spacing: 2px;
  }

  @media (max-width: 768px) {
    header { padding: 20px; }
    main { padding: 20px; }
    .search-bar { padding: 16px 20px; flex-wrap: wrap; }
    .featured-grid { grid-template-columns: 1fr; }
    .layout-with-sidebar { grid-template-columns: 1fr; }
    .ad-sidebar { display: none; }
    .videos-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
    footer { flex-direction: column; gap: 12px; text-align: center; }
  }
</style>
</head>
<body>

<!-- 頂部廣告版位 -->
<div class="ad-top">
  <span>廣告版位 — ADVERTISEMENT 728×90</span>
</div>

<!-- Header -->
<header>
  <div class="logo">
    <div>
      <div class="logo-main">預告星球</div>
      <div class="logo-sub">Movie Trailer Universe</div>
    </div>
  </div>
  <div class="header-right">
    <div><span class="live-dot"></span>自動更新中</div>

<!-- 搜尋列 -->
<div class="search-bar">
  <input type="text" id="searchInput" placeholder="搜尋電影名稱..." />
  <button class="btn" onclick="searchTrailers()">搜尋</button>
  <div class="filter-btns">
    <button class="filter-btn active" onclick="loadCategory(this, '電影預告片 2025 官方')">最新</button>
    <button class="filter-btn" onclick="loadCategory(this, '台灣院線 預告片 2025')">台灣院線</button>

<!-- 主內容 -->
<main>

      <!-- 精選區 -->

          <span class="loading-dots">載入中</span>

      </div>

      <!-- 中間廣告 -->
      <div class="ad-middle">
        廣告版位 — ADVERTISEMENT 728×90<br>
        <small style="opacity:0.5;margin-top:8px;display:block">Google AdSense 代碼放置於此</small>
      </div>

      <!-- 更多影片 -->
      <div class="section-title">更多預告片</div>

        <span class="loading-dots">載入中</span>
      </div>
    </div>

    <!-- 側邊廣告 -->
    <div class="ad-sidebar">
      <div class="ad-sidebar-inner">
        <div>廣告版位</div>
        <div>ADVERTISEMENT</div>
        <div style="margin-top:8px;opacity:0.5;font-size:10px">300×600</div>
        <div style="opacity:0.5;font-size:10px">Google AdSense</div>
      </div>

<!-- 影片 Modal -->
<div class="modal" id="videoModal" onclick="closeModal(event)">
  <div class="modal-inner">
    <button class="modal-close" onclick="closeVideoModal()">✕ 關閉</button>
    <iframe class="modal-video" id="modalIframe" allowfullscreen allow="autoplay"></iframe>
    <div class="modal-title" id="modalTitle"></div>

</div>

<footer>
  <div>© 2025 預告星球 · 所有預告片版權歸原電影公司所有</div>
  <div class="tmdb-credit">
    This product uses the YouTube Data API · Powered by Google
  </div>
</footer>

<script>
const API_KEY = 'AIzaSyDzTEh4VKdi5Ov152yUrwEiOVdAV_18tCs';
let allVideos = [];
let currentQuery = '電影預告片 2025 官方';

async function fetchTrailers(query, maxResults = 20) {
  const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&videoCategoryId=1&maxResults=${maxResults}&order=date&relevanceLanguage=zh-Hant&key=${API_KEY}`;
  
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return data.items || [];
  } catch (e) {
    console.error(e);
    return null;
  }
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

function truncate(str, len) {
  return str.length > len ? str.slice(0, len) + '…' : str;
}

function openVideo(videoId, title, date) {
  document.getElementById('modalIframe').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalMeta').textContent = `發布日期：${formatDate(date)}`;
  document.getElementById('videoModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeVideoModal() {
  document.getElementById('videoModal').classList.remove('open');
  document.getElementById('modalIframe').src = '';
  document.body.style.overflow = '';
}

function closeModal(e) {
  if (e.target === document.getElementById('videoModal')) closeVideoModal();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeVideoModal();
});

function renderFeatured(videos) {
  if (!videos || videos.length === 0) {
    document.getElementById('featuredContainer').innerHTML = '<div class="error-msg">無法載入影片，請稍後再試</div>';
    return;
  }

  const main = videos[0];
  const sides = videos.slice(1, 4);

  const mainHtml = `
    <div class="featured-main" onclick="openVideo('${main.id.videoId}', '${main.snippet.title.replace(/'/g,"\\'")}', '${main.snippet.publishedAt}')">
      <img class="thumbnail" src="${main.snippet.thumbnails.high?.url || main.snippet.thumbnails.medium?.url}" alt="${main.snippet.title}" loading="lazy">
      <div class="play-btn"></div>
      <div class="overlay">
        <div class="video-tag">★ 精選預告</div>
        <div class="video-title">${truncate(main.snippet.title, 50)}</div>
        <div class="video-meta">${main.snippet.channelTitle} · ${formatDate(main.snippet.publishedAt)}</div>
      </div>
    </div>
  `;

  const sidesHtml = sides.map(v => `
    <div class="side-card" onclick="openVideo('${v.id.videoId}', '${v.snippet.title.replace(/'/g,"\\'")}', '${v.snippet.publishedAt}')">
      <img class="thumb" src="${v.snippet.thumbnails.medium?.url}" alt="${v.snippet.title}" loading="lazy">
      <div class="info">
        <div class="tag">新片預告</div>
        <div class="title">${truncate(v.snippet.title, 40)}</div>
        <div class="meta">${formatDate(v.snippet.publishedAt)}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('featuredContainer').innerHTML = `
    <div class="featured-grid">
      ${mainHtml}
      <div class="featured-side">${sidesHtml}</div>
    </div>
  `;
}

function renderVideos(videos) {
  if (!videos || videos.length === 0) {
    document.getElementById('videosContainer').innerHTML = '<div class="error-msg">無法載入影片</div>';
    return;
  }

  const html = videos.slice(4).map(v => `
    <div class="video-card" onclick="openVideo('${v.id.videoId}', '${v.snippet.title.replace(/'/g,"\\'")}', '${v.snippet.publishedAt}')">
      <div class="thumb-wrap">
        <img class="thumb" src="${v.snippet.thumbnails.medium?.url}" alt="${v.snippet.title}" loading="lazy">
        <div class="play-overlay"><div class="mini-play"></div></div>
      </div>
      <div class="card-info">
        <div class="card-tag">預告片</div>
        <div class="card-title">${truncate(v.snippet.title, 45)}</div>
        <div class="card-meta">${v.snippet.channelTitle} · ${formatDate(v.snippet.publishedAt)}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('videosContainer').innerHTML = `<div class="videos-grid">${html}</div>`;
}

async function loadTrailers(query) {
  document.getElementById('featuredContainer').innerHTML = '<div class="loading"><span class="loading-dots">載入中</span></div>';
  document.getElementById('videosContainer').innerHTML = '<div class="loading"><span class="loading-dots">載入中</span></div>';

  const videos = await fetchTrailers(query, 20);
  
  if (!videos) {
    document.getElementById('featuredContainer').innerHTML = '<div class="error-msg">API 載入失敗，請檢查網路連線</div>';
    document.getElementById('videosContainer').innerHTML = '';
    return;
  }

  allVideos = videos;
  renderFeatured(videos);
  renderVideos(videos);
}

function loadCategory(btn, query) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentQuery = query;
  loadTrailers(query);
}

function searchTrailers() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  currentQuery = q + ' 預告片 trailer';
  loadTrailers(currentQuery);
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchTrailers();
});

// 初始載入
loadTrailers(currentQuery);
</script>
</body>
</html>
