<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>預告星球 — 最新電影預告片</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #141414;
    --surface: #1a1a1a;
    --card: #222;
    --accent: #e50914;
    --text: #f5f5f1;
    --muted: #999;
    --border: #333;
    --nav-h: 60px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ═══════════════════════════
     NAVBAR
  ═══════════════════════════ */
  .navbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
    height: var(--nav-h);
    padding: 0 4vw;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
    transition: background 0.3s;
    gap: 16px;
  }
  .navbar.scrolled { background: var(--bg); }

  .nav-logo {
    font-size: clamp(20px, 3vw, 28px);
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -1px;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* 桌面導航連結 */
  .nav-links {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: nowrap;
  }
  .nav-link {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    border: none;
    background: none;
    font-family: 'Noto Sans TC', sans-serif;
    white-space: nowrap;
    transition: color 0.2s;
    padding: 4px 0;
  }
  .nav-link:hover, .nav-link.active { color: #fff; }

  /* 搜尋列 */
  .nav-search {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .nav-search input {
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    padding: 6px 12px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    outline: none;
    width: clamp(120px, 15vw, 200px);
    border-radius: 2px;
    transition: border-color 0.2s;
  }
  .nav-search input:focus { border-color: #fff; }
  .nav-search input::placeholder { color: rgba(255,255,255,0.4); }
  .nav-search button {
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    border-radius: 2px;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .nav-search button:hover { background: #c40812; }

  /* 漢堡選單（手機） */
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
    background: none;
    border: none;
    flex-shrink: 0;
  }
  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: #fff;
    border-radius: 2px;
    transition: all 0.3s;
  }
  .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

  /* 手機選單 */
  .mobile-menu {
    display: none;
    position: fixed;
    top: var(--nav-h);
    left: 0; right: 0;
    background: rgba(20,20,20,0.98);
    z-index: 199;
    padding: 20px;
    flex-direction: column;
    gap: 4px;
    border-bottom: 1px solid var(--border);
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu-link {
    background: none;
    border: none;
    color: rgba(255,255,255,0.8);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 15px;
    padding: 12px 8px;
    text-align: left;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: color 0.2s;
  }
  .mobile-menu-link:hover { color: #fff; }
  .mobile-search {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .mobile-search input {
    flex: 1;
    background: rgba(255,255,255,0.1);
    border: 1px solid var(--border);
    color: #fff;
    padding: 10px 14px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    outline: none;
    border-radius: 2px;
  }
  .mobile-search input::placeholder { color: var(--muted); }
  .mobile-search button {
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 10px 16px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    border-radius: 2px;
  }

  /* ═══════════════════════════
     HERO
  ═══════════════════════════ */
  .hero {
    position: relative;
    width: 100%;
    height: 100svh;
    min-height: 500px;
    max-height: 900px;
    overflow: hidden;
    background: #000;
    margin-top: 0;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s ease;
  }
  .hero-bg.loaded { opacity: 0.55; }
  .hero-gradient {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to right, rgba(20,20,20,0.95) 0%, rgba(20,20,20,0.5) 60%, rgba(20,20,20,0.0) 100%),
      linear-gradient(to top, rgba(20,20,20,1) 0%, rgba(20,20,20,0.0) 45%);
  }
  .hero-content {
    position: absolute;
    bottom: clamp(80px, 15vh, 180px);
    left: 4vw;
    max-width: min(560px, 90vw);
    animation: heroIn 0.8s ease both;
  }
  @keyframes heroIn {
    from { opacity:0; transform:translateY(24px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #fff;
    font-size: clamp(9px, 1.2vw, 11px);
    font-weight: 700;
    padding: 4px 12px;
    letter-spacing: 2px;
    margin-bottom: clamp(10px, 2vh, 16px);
    font-family: 'Space Mono', monospace;
  }
  .hero-title {
    font-size: clamp(24px, 5vw, 56px);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: clamp(8px, 1.5vh, 14px);
    text-shadow: 2px 2px 12px rgba(0,0,0,0.6);
    letter-spacing: -0.5px;
  }
  .hero-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: clamp(8px, 1.5vh, 14px);
    font-size: clamp(11px, 1.5vw, 13px);
    color: rgba(255,255,255,0.7);
    font-weight: 300;
    flex-wrap: wrap;
  }
  .hero-meta-dot { width:4px; height:4px; background:rgba(255,255,255,0.4); border-radius:50%; flex-shrink:0; }
  .hero-desc {
    font-size: clamp(12px, 1.6vw, 15px);
    line-height: 1.7;
    color: rgba(255,255,255,0.75);
    margin-bottom: clamp(16px, 3vh, 28px);
    font-weight: 300;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .hero-buttons { display:flex; gap:10px; flex-wrap:wrap; }
  .hero-btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    background: #fff; color: #000; border: none;
    padding: clamp(10px,1.5vh,14px) clamp(18px,2.5vw,30px);
    font-size: clamp(13px, 1.6vw, 16px);
    font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.2s; border-radius: 4px;
  }
  .hero-btn-primary:hover { background: rgba(255,255,255,0.8); transform: scale(1.03); }
  .hero-btn-primary::before { content:'▶'; font-size:12px; }
  .hero-btn-secondary {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(109,109,110,0.7); color: #fff; border: none;
    padding: clamp(10px,1.5vh,14px) clamp(18px,2.5vw,30px);
    font-size: clamp(13px, 1.6vw, 16px);
    font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.2s; border-radius: 4px;
  }
  .hero-btn-secondary:hover { background: rgba(109,109,110,0.5); transform: scale(1.03); }
  .hero-btn-secondary::before { content:'ℹ'; }

  .hero-indicators {
    position: absolute;
    bottom: clamp(40px, 8vh, 80px);
    right: 4vw;
    display: flex; gap: 6px;
  }
  .hero-dot { width:12px; height:3px; background:rgba(255,255,255,0.3); cursor:pointer; border:none; transition:all 0.3s; border-radius:2px; }
  .hero-dot.active { background:#fff; width:20px; }

  .hero-loading {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Mono',monospace; font-size:13px;
    color:var(--muted); letter-spacing:3px;
  }

  /* ═══════════════════════════
     AD TOP
  ═══════════════════════════ */
  .ad-top {
    background: var(--surface);
    text-align: center;
    padding: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    border-bottom: 1px solid var(--border);
  }
  .ad-top span { border:1px dashed var(--border); padding:4px 16px; display:inline-block; }

  /* ═══════════════════════════
     CATEGORY BAR
  ═══════════════════════════ */
  .category-bar {
    background: var(--bg);
    padding: 14px 4vw;
    display: flex;
    gap: 8px;
    flex-wrap: nowrap;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: var(--nav-h);
    z-index: 50;
    scrollbar-width: none;
  }
  .category-bar::-webkit-scrollbar { display: none; }
  .cat-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 14px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: clamp(11px, 1.3vw, 13px);
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .cat-btn:hover, .cat-btn.active { border-color:#fff; color:#fff; background:rgba(255,255,255,0.07); }

  /* ═══════════════════════════
     CONTENT
  ═══════════════════════════ */
  .content-section { padding: clamp(20px,4vw,40px) 4vw; }

  .row-title {
    font-size: clamp(16px, 2.2vw, 20px);
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .row-title-sub {
    font-size: 13px;
    color: #46d369;
    font-weight: 400;
    cursor: pointer;
  }
  .row-title-sub:hover { color: #fff; }

  /* 水平滾動列 */
  .movies-row {
    display: flex;
    gap: clamp(6px, 1vw, 10px);
    overflow-x: auto;
    padding-bottom: 8px;
    scrollbar-width: thin;
    scrollbar-color: #555 transparent;
  }
  .movies-row::-webkit-scrollbar { height: 3px; }
  .movies-row::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }

  .movie-card {
    flex-shrink: 0;
    width: clamp(140px, 18vw, 220px);
    cursor: pointer;
    position: relative;
    border-radius: 4px;
    overflow: hidden;
    transition: transform 0.3s;
    z-index: 1;
  }
  .movie-card:hover {
    transform: scale(1.12);
    z-index: 10;
    box-shadow: 0 10px 32px rgba(0,0,0,0.8);
  }
  .movie-card img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    background: #222;
  }
  .movie-card-info {
    background: #222;
    padding: 8px 10px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .movie-card:hover .movie-card-info { opacity: 1; }
  .movie-card-title { font-size: 11px; font-weight: 700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:3px; }
  .movie-card-meta { font-size: 10px; color: var(--muted); font-weight: 300; }
  .movie-card-play {
    position: absolute; top:8px; right:8px;
    width:28px; height:28px;
    background: rgba(0,0,0,0.7); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity 0.2s;
  }
  .movie-card:hover .movie-card-play { opacity:1; }
  .movie-card-play::after { content:''; border-left:9px solid #fff; border-top:5px solid transparent; border-bottom:5px solid transparent; margin-left:2px; }

  /* 格線（平板以上） */
  .movies-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(clamp(140px,18vw,200px), 1fr));
    gap: clamp(6px,1vw,10px);
  }
  .grid-card {
    cursor: pointer;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    transition: transform 0.3s;
    background: var(--card);
  }
  .grid-card:hover { transform: scale(1.04); box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
  .grid-card img { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; background:#222; }
  .grid-card-info { padding: 10px; }
  .grid-card-title { font-size:clamp(11px,1.2vw,13px); font-weight:700; line-height:1.4; margin-bottom:4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .grid-card-meta { font-size:10px; color:var(--muted); font-weight:300; }
  .grid-card-play { position:absolute; top:8px; right:8px; width:28px; height:28px; background:rgba(0,0,0,0.7); border-radius:50%; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.2s; }
  .grid-card:hover .grid-card-play { opacity:1; }
  .grid-card-play::after { content:''; border-left:9px solid #fff; border-top:5px solid transparent; border-bottom:5px solid transparent; margin-left:2px; }

  /* ═══════════════════════════
     AD MID
  ═══════════════════════════ */
  .ad-mid {
    margin: 0 4vw 32px;
    background: var(--surface);
    border: 1px dashed var(--border);
    text-align: center;
    padding: clamp(20px, 3vw, 36px);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    border-radius: 4px;
  }

  /* ═══════════════════════════
     MODAL
  ═══════════════════════════ */
  .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.94); z-index:1000; align-items:center; justify-content:center; padding:16px; }
  .modal.open { display:flex; }
  .modal-inner { width:100%; max-width:min(900px,95vw); position:relative; }
  .modal-close { position:absolute; top:-40px; right:0; background:none; border:1px solid rgba(255,255,255,0.3); color:#fff; padding:5px 12px; font-size:12px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; border-radius:2px; }
  .modal-close:hover { background:rgba(255,255,255,0.1); }
  .modal-video { width:100%; aspect-ratio:16/9; border:none; border-radius:4px; }
  .modal-title { margin-top:12px; font-size:clamp(15px,2.5vw,20px); font-weight:700; }
  .modal-meta { font-size:12px; color:var(--muted); margin-top:5px; font-weight:300; }

  /* ═══════════════════════════
     LOADING / ERROR
  ═══════════════════════════ */
  .loading { text-align:center; padding:60px; font-family:'Space Mono',monospace; color:var(--muted); letter-spacing:3px; font-size:12px; }
  .loading-dots::after { content:''; animation:dots 1.5s infinite; }
  @keyframes dots { 0%{content:''} 33%{content:'.'} 66%{content:'..'} 100%{content:'...'} }
  .error-msg { text-align:center; padding:40px; color:var(--accent); font-size:12px; font-family:'Space Mono',monospace; letter-spacing:2px; }

  /* ═══════════════════════════
     FOOTER
  ═══════════════════════════ */
  footer {
    padding: clamp(20px,4vw,40px) 4vw;
    border-top: 1px solid var(--border);
    font-size: 12px; color: var(--muted); font-weight: 300;
    display: flex; flex-wrap: wrap;
    justify-content: space-between; align-items: center; gap: 8px;
  }

  /* ═══════════════════════════
     BREAKPOINTS
  ═══════════════════════════ */

  /* 平板以下 */
  @media (max-width: 900px) {
    .nav-links { display: none; }
    .hamburger { display: flex; }
    .nav-search { display: none; }
    .hero-desc { -webkit-line-clamp: 2; }
  }

  /* 手機 */
  @media (max-width: 600px) {
    :root { --nav-h: 54px; }
    .hero { max-height: 70svh; min-height: 400px; }
    .hero-content { bottom: clamp(60px, 10vh, 100px); }
    .hero-desc { display: none; }
    .hero-indicators { bottom: 20px; right: 4vw; }
    .hero-btn-secondary { display: none; }
    .movies-row { gap: 6px; }
    .movie-card { width: clamp(120px, 36vw, 160px); }
    footer { flex-direction: column; text-align: center; }
  }

  /* 超小手機 */
  @media (max-width: 380px) {
    .hero-title { font-size: 20px; }
    .hero-btn-primary { font-size: 12px; padding: 9px 16px; }
    .movie-card { width: clamp(110px, 42vw, 140px); }
  }

  /* 大螢幕 */
  @media (min-width: 1400px) {
    .navbar { padding: 0 80px; }
    .hero-content { left: 80px; }
    .hero-indicators { right: 80px; }
    .category-bar { padding: 14px 80px; }
    .content-section { padding: 40px 80px; }
    .ad-mid { margin: 0 80px 40px; }
    footer { padding: 40px 80px; }
  }
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar" id="navbar">
  <div class="nav-logo" onclick="scrollTo(0,0)">預告星球</div>
  <div class="nav-links" id="navLinks">
    <button class="nav-link active" onclick="loadCategory(this,'電影預告片 2025 官方')">最新</button>
    <button class="nav-link" onclick="loadCategory(this,'台灣院線 預告片 2025')">台灣院線</button>
    <button class="nav-link" onclick="loadCategory(this,'動作電影 trailer 2025')">動作</button>
    <button class="nav-link" onclick="loadCategory(this,'動畫電影 trailer 2025')">動畫</button>
    <button class="nav-link" onclick="loadCategory(this,'恐怖電影 trailer 2025')">恐怖</button>
    <button class="nav-link" onclick="loadCategory(this,'Marvel DC trailer 2025')">漫威DC</button>
  </div>
  <div class="nav-search">
    <input type="text" id="searchInput" placeholder="搜尋電影...">
    <button onclick="searchTrailers()">搜尋</button>
  </div>
  <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="選單">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- 手機選單 -->
<div class="mobile-menu" id="mobileMenu">
  <button class="mobile-menu-link" onclick="loadCategoryMobile(this,'電影預告片 2025 官方')">🔥 最新</button>
  <button class="mobile-menu-link" onclick="loadCategoryMobile(this,'台灣院線 預告片 2025')">🇹🇼 台灣院線</button>
  <button class="mobile-menu-link" onclick="loadCategoryMobile(this,'動作電影 trailer 2025')">💥 動作</button>
  <button class="mobile-menu-link" onclick="loadCategoryMobile(this,'動畫電影 trailer 2025')">🎨 動畫</button>
  <button class="mobile-menu-link" onclick="loadCategoryMobile(this,'恐怖電影 trailer 2025')">👻 恐怖</button>
  <button class="mobile-menu-link" onclick="loadCategoryMobile(this,'Marvel DC trailer 2025')">🦸 漫威DC</button>
  <button class="mobile-menu-link" onclick="loadCategoryMobile(this,'韓國電影 trailer 2025')">🇰🇷 韓國</button>
  <button class="mobile-menu-link" onclick="loadCategoryMobile(this,'日本電影 trailer 2025')">🇯🇵 日本</button>
  <div class="mobile-search">
    <input type="text" id="mobileSearchInput" placeholder="搜尋電影...">
    <button onclick="mobileSearch()">搜尋</button>
  </div>
</div>

<!-- Hero -->
<div class="hero" id="hero">
  <div class="hero-loading" id="heroLoading"><span class="loading-dots">載入最新電影</span></div>
  <img class="hero-bg" id="heroBg" src="" alt="">
  <div class="hero-gradient"></div>
  <div class="hero-content" id="heroContent" style="display:none">
    <div class="hero-badge">★ 最新預告</div>
    <div class="hero-title" id="heroTitle"></div>
    <div class="hero-meta" id="heroMeta"></div>
    <div class="hero-desc" id="heroDesc"></div>
    <div class="hero-buttons">
      <button class="hero-btn-primary" id="heroPlayBtn">立即觀看</button>
      <button class="hero-btn-secondary" id="heroMoreBtn">更多資訊</button>
    </div>
  </div>
  <div class="hero-indicators" id="heroIndicators"></div>
</div>

<!-- 廣告版位 -->
<div class="ad-top"><span>廣告版位 — ADVERTISEMENT</span></div>

<!-- 分類列 -->
<div class="category-bar">
  <button class="cat-btn active" onclick="loadCategory(this,'電影預告片 2025 官方')">🔥 最新</button>
  <button class="cat-btn" onclick="loadCategory(this,'台灣院線 預告片 2025')">🇹🇼 台灣院線</button>
  <button class="cat-btn" onclick="loadCategory(this,'動作電影 trailer 2025')">💥 動作</button>
  <button class="cat-btn" onclick="loadCategory(this,'動畫電影 trailer 2025')">🎨 動畫</button>
  <button class="cat-btn" onclick="loadCategory(this,'恐怖電影 trailer 2025')">👻 恐怖</button>
  <button class="cat-btn" onclick="loadCategory(this,'Marvel DC trailer 2025')">🦸 漫威DC</button>
  <button class="cat-btn" onclick="loadCategory(this,'韓國電影 trailer 2025')">🇰🇷 韓國</button>
  <button class="cat-btn" onclick="loadCategory(this,'日本電影 trailer 2025')">🇯🇵 日本</button>
</div>

<!-- 內容 -->
<div class="content-section">
  <div class="row-title">
    最新預告片
    <span class="row-title-sub" onclick="scrollTo({top:0,behavior:'smooth'})">↑ 返回頂部</span>
  </div>
  <!-- 手機：水平滾動；平板+：格線 -->
  <div id="moviesRowWrap">
    <div class="loading"><span class="loading-dots">載入中</span></div>
  </div>
</div>

<!-- 廣告版位中間 -->
<div class="ad-mid">
  廣告版位 — ADVERTISEMENT 728×90<br>
  <small style="opacity:0.5;margin-top:6px;display:block">Google AdSense 代碼放置於此</small>
</div>

<!-- Modal -->
<div class="modal" id="videoModal" onclick="closeModal(event)">
  <div class="modal-inner">
    <button class="modal-close" onclick="closeVideoModal()">✕ 關閉</button>
    <iframe class="modal-video" id="modalIframe" allowfullscreen allow="autoplay"></iframe>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-meta" id="modalMeta"></div>
  </div>
</div>

<!-- Footer -->
<footer>
  <div>© 2025 預告星球 · 所有預告片版權歸原電影公司所有</div>
  <div>Powered by YouTube Data API · Google</div>
</footer>

<script>
const API_KEY = 'AIzaSyDzTEh4VKdi5Ov152yUrwEiOVdAV_18tCs';
let allVideos=[], heroIndex=0, heroTimer=null, menuOpen=false;

// Navbar scroll
window.addEventListener('scroll',()=>{
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY>60);
});

// 漢堡選單
function toggleMenu(){
  menuOpen=!menuOpen;
  document.getElementById('hamburger').classList.toggle('open',menuOpen);
  document.getElementById('mobileMenu').classList.toggle('open',menuOpen);
}
document.addEventListener('click',e=>{
  if(menuOpen && !e.target.closest('#mobileMenu') && !e.target.closest('#hamburger')){
    menuOpen=false;
    document.getElementById('hamburger').classList.remove('open');
    document.getElementById('mobileMenu').classList.remove('open');
  }
});

function formatDate(s){
  const d=new Date(s);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}
function truncate(s,n){ return s&&s.length>n?s.slice(0,n)+'…':(s||''); }
function esc(s){ return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

// Modal
function openVideo(videoId,title,date){
  document.getElementById('modalIframe').src=`https://www.youtube.com/embed/${videoId}?autoplay=1`;
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalMeta').textContent=`發布日期：${formatDate(date)}`;
  document.getElementById('videoModal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeVideoModal(){
  document.getElementById('videoModal').classList.remove('open');
  document.getElementById('modalIframe').src='';
  document.body.style.overflow='';
}
function closeModal(e){ if(e.target===document.getElementById('videoModal')) closeVideoModal(); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeVideoModal(); });

// Hero
function buildHero(videos){
  const hv=videos.slice(0,5);
  document.getElementById('heroLoading').style.display='none';
  document.getElementById('heroIndicators').innerHTML=hv.map((_,i)=>
    `<button class="hero-dot ${i===0?'active':''}" onclick="setHero(${i})"></button>`
  ).join('');
  setHero(0,hv);
  if(heroTimer) clearInterval(heroTimer);
  heroTimer=setInterval(()=>{ heroIndex=(heroIndex+1)%hv.length; setHero(heroIndex,hv); },7000);
}
function setHero(i,videos){
  const v=(videos||allVideos.slice(0,5))[i]; if(!v) return;
  heroIndex=i;
  const thumb=v.snippet.thumbnails.maxres?.url||v.snippet.thumbnails.high?.url||v.snippet.thumbnails.medium?.url;
  const title=v.snippet.title, desc=truncate(v.snippet.description||v.snippet.channelTitle,120);
  const vid=v.id.videoId, date=v.snippet.publishedAt, ch=v.snippet.channelTitle;
  const bg=document.getElementById('heroBg');
  bg.classList.remove('loaded');
  bg.src=thumb;
  bg.onload=()=>bg.classList.add('loaded');
  document.getElementById('heroTitle').textContent=truncate(title,50);
  document.getElementById('heroMeta').innerHTML=`<span>${ch}</span><span class="hero-meta-dot"></span><span>${formatDate(date)}</span>`;
  document.getElementById('heroDesc').textContent=desc;
  document.getElementById('heroContent').style.display='block';
  document.getElementById('heroPlayBtn').onclick=()=>openVideo(vid,title,date);
  document.getElementById('heroMoreBtn').onclick=()=>openVideo(vid,title,date);
  document.querySelectorAll('.hero-dot').forEach((d,j)=>d.classList.toggle('active',j===i));
}

// 判斷螢幕寬度，決定用格線或水平滾動
function isMobile(){ return window.innerWidth < 600; }

function renderMovies(videos){
  if(!videos||!videos.length){
    document.getElementById('moviesRowWrap').innerHTML='<div class="error-msg">無法載入影片</div>';
    return;
  }
  if(isMobile()){
    // 手機：水平滾動
    const html=videos.map(v=>`
      <div class="movie-card" onclick="openVideo('${v.id.videoId}','${esc(v.snippet.title)}','${v.snippet.publishedAt}')">
        <img src="${v.snippet.thumbnails.medium?.url}" alt="${esc(v.snippet.title)}" loading="lazy">
        <div class="movie-card-play"></div>
        <div class="movie-card-info">
          <div class="movie-card-title">${truncate(v.snippet.title,30)}</div>
          <div class="movie-card-meta">${formatDate(v.snippet.publishedAt)}</div>
        </div>
      </div>`).join('');
    document.getElementById('moviesRowWrap').innerHTML=`<div class="movies-row">${html}</div>`;
  } else {
    // 平板/電腦：格線
    const html=videos.map(v=>`
      <div class="grid-card" onclick="openVideo('${v.id.videoId}','${esc(v.snippet.title)}','${v.snippet.publishedAt}')">
        <img src="${v.snippet.thumbnails.medium?.url}" alt="${esc(v.snippet.title)}" loading="lazy">
        <div class="grid-card-play"></div>
        <div class="grid-card-info">
          <div class="grid-card-title">${truncate(v.snippet.title,42)}</div>
          <div class="grid-card-meta">${v.snippet.channelTitle} · ${formatDate(v.snippet.publishedAt)}</div>
        </div>
      </div>`).join('');
    document.getElementById('moviesRowWrap').innerHTML=`<div class="movies-grid">${html}</div>`;
  }
}

// Re-render on resize
let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{ if(allVideos.length) renderMovies(allVideos); },300);
});

async function fetchTrailers(query,maxResults=20){
  const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&maxResults=${maxResults}&order=date&relevanceLanguage=zh-Hant&key=${API_KEY}`;
  try{
    const res=await fetch(url);
    const data=await res.json();
    if(data.error) throw new Error(data.error.message);
    return data.items||[];
  }catch(e){ console.error(e); return null; }
}

async function loadTrailers(query){
  document.getElementById('moviesRowWrap').innerHTML='<div class="loading"><span class="loading-dots">載入中</span></div>';
  document.getElementById('heroLoading').style.display='flex';
  document.getElementById('heroContent').style.display='none';
  document.getElementById('heroBg').classList.remove('loaded');
  const videos=await fetchTrailers(query);
  if(!videos){
    document.getElementById('moviesRowWrap').innerHTML='<div class="error-msg">API 載入失敗，請檢查網路連線</div>';
    document.getElementById('heroLoading').innerHTML='<span style="color:#e50914">載入失敗</span>';
    return;
  }
  allVideos=videos;
  buildHero(videos);
  renderMovies(videos);
}

function loadCategory(btn,query){
  document.querySelectorAll('.cat-btn,.nav-link').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadTrailers(query);
  if(menuOpen) toggleMenu();
}
function loadCategoryMobile(btn,query){
  loadTrailers(query);
  toggleMenu();
}
function searchTrailers(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q) return;
  document.querySelectorAll('.cat-btn,.nav-link').forEach(b=>b.classList.remove('active'));
  loadTrailers(q+' 預告片 trailer');
}
function mobileSearch(){
  const q=document.getElementById('mobileSearchInput').value.trim();
  if(!q) return;
  toggleMenu();
  loadTrailers(q+' 預告片 trailer');
}
document.getElementById('searchInput').addEventListener('keydown',e=>{ if(e.key==='Enter') searchTrailers(); });
document.getElementById('mobileSearchInput').addEventListener('keydown',e=>{ if(e.key==='Enter') mobileSearch(); });

loadTrailers('電影預告片 2025 官方');
</script>
</body>
</html>
